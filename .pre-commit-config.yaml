repos:
# uv (lock file is up to date)
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.8.4
  hooks:
  - id: uv-lock
# Ruff (replaces black, isort, linter)
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.12.7
  hooks:
  - id: ruff
    args: [ --fix ]
  - id: ruff-format
# mypy
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 'v1.17.1'
  hooks:
  - id: mypy
    args: [ --strict ]
